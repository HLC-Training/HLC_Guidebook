<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HLC Training</title>
</head>
<body>
    <header class="hero">
        <h1 id="welcome-title">Loading...</h1>
    </header>

    <section id="action-panel" class="action-grid"></section>

    <section id="safety-section" style="display:none;">
        <h2 id="safety-title"></h2>
        <p id="safety-text"></p>
        <div id="rules-grid" class="action-grid"></div>
    </section>

    <section id="contact-section" style="display:none;">
        <h2>KEY CONTACTS</h2>
        <div id="contact-list" class="action-grid"></div>
    </section>

    <section id="map-section" style="display:none;">
        <h2 id="map-title"></h2>
        <div id="map-container"></div>
        <div id="map-legend" class="map-legend"></div>
    </section>

    <section id="campus-map-section">
        <div id="campus-map-container"></div>
    </section>

    <section id="site-rules-section">
        <div id="emergency-callout"></div>
        <h2 id="site-rules-title"></h2>
        <div id="site-rules-grid"></div>
        <div id="rules-contacts">
            <h3 id="rules-contacts-title"></h3>
            <table id="rules-contacts-table"></table>
        </div>
        <div id="rules-signature"></div>
    </section>

    <section>
        <h2 id="list-title"></h2>
        <ul id="list-container"></ul>
    </section>

    <footer>
        <p>GE Vernova Houston Learning Center | 8800 Wallisville Rd, Houston TX 77029</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
